server.port=8084

# Mail configuration (fill in your SMTP settings)
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=your-email@example.com
spring.mail.password=your-email-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio configuration
twilio.sid=your-twilio-sid
twilio.token=your-twilio-token
twilio.from=your-twilio-from-number

# Twilio configuration (for SMS)
twilio.accountSid=YOUR_TWILIO_SID
twilio.authToken=YOUR_TWILIO_TOKEN
twilio.fromNumber=+1234567890
