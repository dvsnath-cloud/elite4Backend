# WhatsApp Business API (Meta Cloud API) configuration
# Get these from: https://developers.facebook.com → WhatsApp → API Setup
whatsapp.api.url=${WHATSAPP_API_URL:https://graph.facebook.com/v19.0}
whatsapp.api.token=${WHATSAPP_API_TOKEN:YOUR_WHATSAPP_ACCESS_TOKEN}
whatsapp.phone.number.id=${WHATSAPP_PHONE_NUMBER_ID:YOUR_WHATSAPP_PHONE_NUMBER_ID}

# Telegram Bot API configuration
telegram.bot.token=${TELEGRAM_BOT_TOKEN:YOUR_TELEGRAM_BOT_TOKEN}
server.port=${SERVER_PORT:8084}

# Mail configuration
spring.mail.host=${MAIL_HOST:smtp.example.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@example.com}
spring.mail.password=${MAIL_PASSWORD:your-email-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio configuration
twilio.sid=${TWILIO_SID:your-twilio-sid}
twilio.token=${TWILIO_TOKEN:your-twilio-token}
twilio.from=${TWILIO_FROM:your-twilio-from-number}

# Twilio configuration (for SMS)
twilio.accountSid=${TWILIO_ACCOUNT_SID:YOUR_TWILIO_SID}
twilio.authToken=${TWILIO_AUTH_TOKEN:YOUR_TWILIO_TOKEN}
twilio.fromNumber=${TWILIO_FROM_NUMBER:+1234567890}
