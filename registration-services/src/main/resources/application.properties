spring.application.name=resgistration-services
server.port=8082
mongodb.uri=mongodb://root:StrongPassword!123@localhost:27017/admin
mongodb.database=admin

# notification service base URL
notification.service.url=http://localhost:8084

# File upload size configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-post-size=52428800

# File Storage Configuration
# Options: LOCAL, S3, AZURE
file.storage.type=LOCAL
file.storage.local.path=uploads/
file.storage.s3.bucket=elite4-registrations
file.storage.s3.region=us-east-1
file.storage.s3.access-key=${AWS_ACCESS_KEY_ID:}
file.storage.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}
file.storage.azure.container=registrations
file.storage.azure.account-name=${AZURE_STORAGE_ACCOUNT:}
file.storage.azure.account-key=${AZURE_STORAGE_ACCOUNT_KEY:}

