spring.application.name=resgistration-services
server.port=${SERVER_PORT:8082}
mongodb.uri=${MONGODB_URI:mongodb://root:StrongPassword!123@localhost:27017/admin}
mongodb.database=${MONGODB_DATABASE:test}
spring.data.mongodb.uri=${MONGODB_URI:mongodb://root:StrongPassword!123@localhost:27017/admin}
spring.data.mongodb.database=${MONGODB_DATABASE:test}

# notification service base URL
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8084}

# payment service base URL
payment.service.url=${PAYMENT_SERVICE_URL:http://localhost:8083}

# File upload size configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-post-size=52428800

# Jackson Configuration - Instant and DateTime serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.indent-output=true

# ──────────────────────────────────────────────────
# File Storage Configuration
# ONE SWITCH: Change file.storage.type to switch for entire project
# Options: LOCAL | S3 | AZURE
# ──────────────────────────────────────────────────
file.storage.type=${FILE_STORAGE_TYPE:LOCAL}

# LOCAL storage (active when file.storage.type=LOCAL)
file.storage.local.path=${FILE_STORAGE_LOCAL_PATH:C:\\ProjectSoftwares\\coLiveFiles}

# AWS S3 storage (active when file.storage.type=S3)
file.storage.s3.bucket=elite4-registrations
file.storage.s3.region=us-east-1
file.storage.s3.prefix=colive-files/
file.storage.s3.access-key=${AWS_ACCESS_KEY_ID:}
file.storage.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}

# Azure Blob Storage (active when file.storage.type=AZURE)
file.storage.azure.container=registrations
file.storage.azure.prefix=colive-files/
file.storage.azure.account-name=${AZURE_STORAGE_ACCOUNT:}
file.storage.azure.account-key=${AZURE_STORAGE_ACCOUNT_KEY:}


tenant.default-password=${TENANT_DEFAULT_PASSWORD:Tenant@123}

# ──────────────────────────────────────────────────
# JWT – RSA RS256 (leave blank to auto-generate ephemeral key pair in dev)
# In production supply PEM via environment variables:
#   JWT_RSA_PRIVATE_KEY  – PKCS#8 PEM private key (single line, no headers)
#   JWT_RSA_PUBLIC_KEY   – X.509 PEM public key   (single line, no headers)
# ──────────────────────────────────────────────────
app.jwt.rsa.private-key=${JWT_RSA_PRIVATE_KEY:}
app.jwt.rsa.public-key=${JWT_RSA_PUBLIC_KEY:}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ──────────────────────────────────────────────────
# Scheduler Infrastructure (RentSchedulerService)
# ──────────────────────────────────────────────────
# RestTemplate timeouts for notification-services calls
scheduler.resttemplate.connect-timeout-ms=${SCHEDULER_REST_CONNECT_TIMEOUT:5000}
scheduler.resttemplate.read-timeout-ms=${SCHEDULER_REST_READ_TIMEOUT:10000}

# Async notification thread pool (for parallel email/SMS/WhatsApp dispatch)
scheduler.notification.pool.core-size=${SCHEDULER_NOTIF_POOL_CORE:20}
scheduler.notification.pool.max-size=${SCHEDULER_NOTIF_POOL_MAX:50}
scheduler.notification.pool.queue-capacity=${SCHEDULER_NOTIF_POOL_QUEUE:5000}

# Scheduler thread pool (allows concurrent @Scheduled jobs)
scheduler.pool.size=${SCHEDULER_POOL_SIZE:3}

# Batch processing size for rent generation (tenants per batch)
scheduler.batch.size=${SCHEDULER_BATCH_SIZE:500}